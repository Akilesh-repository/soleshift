<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - SoleShift Premium Footwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:ital,wght@0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CORE STYLES & VARIABLES (SOLESHIFT THEME)
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* STRICT NO SCROLL LOCK */
        html, body { 
            height: 100vh !important; 
            width: 100vw !important;
            overflow: hidden !important; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
        }

        h1, h2, h3, .brand-font {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
        }

        /* === SoleShift THEME VARIABLES === */
        :root {
            --bg-color: #F8FAFC; /* Slate 50 */
            --bg-card: #FFFFFF; 
            --card-border: #E2E8F0; /* Slate 200 */
            --text-main: #0F172A; /* Slate 900 */
            --text-muted: #475569; /* Slate 600 */
            
            --input-bg: #F1F5F9; /* Slate 100 */
            --input-border: #E2E8F0;
            --input-focus-bg: #FFFFFF;
            --input-text: #0F172A;
            --input-icon: #94A3B8;
            
            --page-text: #475569; 
            --toggle-bg: #E2E8F0; 
            
            --accent-color: #F97316; /* Orange 500 */
            --accent-hover: #EA580C; /* Orange 600 */
            --btn-text: #FFFFFF;
            
            --radius: 16px; 
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            --btn-shadow: 0 4px 10px 0 rgba(249, 115, 22, 0.2);
            --btn-shadow-hover: 0 8px 15px -3px rgba(249, 115, 22, 0.4);
        }

        /* DARK MODE */
        body.dark-mode {
            --bg-color: #020617; /* Slate 950 */
            --bg-card: #1E293B; /* Slate 800 */
            --card-border: #334155; /* Slate 700 */
            --text-main: #F8FAFC; /* Slate 50 */
            --text-muted: #94A3B8; /* Slate 400 */
            
            --input-bg: #0F172A; /* Slate 900 */
            --input-border: #334155;
            --input-focus-bg: #020617;
            --input-text: #F8FAFC;
            --input-icon: #64748B;
            
            --page-text: #E2E8F0; 
            --toggle-bg: #334155; 
            
            --accent-color: #FB923C; /* Orange 400 */
            --accent-hover: #F97316; /* Orange 500 */
            --btn-text: #020617; /* Slate 950 */

            --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            --btn-shadow: 0 4px 10px 0 rgba(251, 146, 60, 0.2);
            --btn-shadow-hover: 0 8px 15px -3px rgba(251, 146, 60, 0.4);
        }

        body { 
            background-color: var(--bg-color);
            transition: background-color 0.5s ease;
            display: flex;
            flex-direction: column; 
            position: relative;
        }

        /* RTL SUPPORT */
        [dir="rtl"] { text-align: right; }
        [dir="rtl"] .ml-2 { margin-left: 0; margin-right: 0.5rem; }
        [dir="rtl"] .mr-3 { margin-left: 0.75rem; margin-right: 0; }
        [dir="rtl"] .input-icon { left: auto; right: 14px; }
        [dir="rtl"] .input-field { padding: 0 40px 0 14px !important; }
        [dir="rtl"] .btn-icon { margin-left: 0; margin-right: 6px; transform: rotate(180deg); }

        /* =========================================
           TOP CONTROLS BAR
           ========================================= */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            padding: 1rem 1.5rem;
            gap: 1rem;
            z-index: 50;
            flex-shrink: 0;
        }

        .toggle { 
            width: 40px; height: 22px; 
            background: var(--toggle-bg); 
            border: 1px solid var(--card-border);
            border-radius: 50px; position: relative; cursor: pointer; transition: 0.3s; 
            flex-shrink: 0;
        }
        .toggle::before { 
            content: ''; position: absolute; width: 16px; height: 16px; 
            background: white; border-radius: 50%; top: 2px; left: 3px; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        body.dark-mode .toggle::before { left: 19px; background: var(--accent-color); box-shadow: none; }
        
        .top-btn-text { 
            font-size: 0.65rem; font-weight: 800; color: var(--page-text); 
            background: var(--bg-card); border: 1px solid var(--card-border); 
            padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: 0.3s; 
            text-transform: uppercase; letter-spacing: 1px; 
        }
        .top-btn-text:hover { border-color: var(--accent-color); color: var(--accent-color); }

        /* MAIN WRAPPER */
        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1rem;
            z-index: 10;
        }

        /* ULTRA-COMPACT VERTICAL LOGIN CARD */
        .login-card {
            background-color: var(--bg-card);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: clamp(1.25rem, 3vh, 2rem) 2rem;
            width: 100%;
            max-width: 380px; 
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 2vh, 18px); 
            position: relative;
            overflow: hidden !important; 
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        /* HEADERS */
        .auth-logo { display: flex; justify-content: center; margin-bottom: 4px; }
        .auth-header { text-align: center; }
        .auth-header h2 { font-size: clamp(1.2rem, 3vh, 1.5rem); color: var(--text-main); margin-bottom: 2px; }
        .auth-header p { font-size: clamp(0.75rem, 1.5vh, 0.8rem); color: var(--text-muted); margin: 0; font-weight: 500; }

        /* COMPACT VERTICAL FORM */
        form { display: flex; flex-direction: column; gap: clamp(10px, 1.5vh, 14px); margin: 0; }

        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { 
            font-size: 0.65rem; font-weight: 800; color: var(--text-main); 
            margin: 0; text-transform: uppercase; letter-spacing: 0.5px;
        }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--input-icon); font-size: 0.85rem; pointer-events: none; }
        
        .input-field {
            width: 100%;
            height: clamp(40px, 5vh, 44px);
            padding: 0 14px 0 38px;
            border: 2px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--input-text);
            border-radius: 8px; /* Squared off to match SoleShift buttons */
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
            margin: 0;
        }
        .input-field::placeholder { color: var(--input-icon); opacity: 0.8; font-weight: 500; }
        .input-field:focus { outline: none; border-color: var(--accent-color); background-color: var(--input-focus-bg); }
        .input-field:focus + .input-icon, .input-field:focus ~ .input-icon { color: var(--accent-color); }

        /* Password Field Specifics */
        .password-field { padding-right: 36px !important; }
        .password-toggle {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            color: var(--input-icon); background: none; border: none; cursor: pointer;
            padding: 4px; font-size: 0.9rem; z-index: 5;
        }
        .password-toggle:hover { color: var(--accent-color); }
        [dir="rtl"] .password-field { padding-right: 38px !important; padding-left: 36px !important; }
        [dir="rtl"] .password-toggle { right: auto; left: 10px; }

        .utility-row { display: flex; align-items: center; justify-content: space-between; margin: 2px 0 0 0; padding: 0; }
        input[type="checkbox"] { width: 14px; height: 14px; border-radius: 4px; cursor: pointer; accent-color: var(--accent-color); }

        /* Compact button */
        .auth-btn {
            width: 100%;
            height: clamp(42px, 5vh, 46px);
            background-color: var(--accent-color); color: var(--btn-text); 
            border: 2px solid var(--accent-color); border-radius: 6px;
            font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--btn-shadow);
            margin-top: 4px;
        }
        .auth-btn:hover { 
            background-color: var(--accent-hover); border-color: var(--accent-hover);
            transform: translateY(-2px); box-shadow: var(--btn-shadow-hover); 
        }

        /* DIVIDER */
        .divider { text-align: center; position: relative; margin: 4px 0; }
        .divider::before { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 1px; background: var(--card-border); }
        .divider span { position: relative; background: var(--bg-card); padding: 0 12px; color: var(--text-muted); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

        /* SOCIALS (Ultra-Compact) */
        .social-login { display: flex; justify-content: center; gap: 12px; }
        .social-btn {
            width: 40px; height: 40px;
            border: 2px solid var(--input-border); border-radius: 8px; 
            background-color: var(--bg-secondary); font-size: 1rem; color: var(--text-main);
            cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center;
        }
        .social-btn:hover { background-color: var(--accent-color); border-color: var(--accent-color); color: var(--btn-text); transform: translateY(-2px); box-shadow: var(--btn-shadow-hover); }

        /* FOOTER LINKS */
        .login-link { text-align: center; font-size: 0.75rem; color: var(--text-muted); font-weight: 500; margin-top: 4px; }
        .login-link a { color: var(--accent-color); font-weight: 800; text-decoration: none; transition: all 0.2s; }
        .login-link a:hover { color: var(--accent-hover); text-decoration: underline; }

        @media (max-width: 400px), (max-height: 650px) {
            .login-card { padding: 1.25rem 1.25rem !important; width: 95%; gap: 12px !important; border-radius: 12px; }
            form { gap: 10px !important; }
            .auth-header p { display: none; }
            .input-field { height: 38px !important; font-size: 0.8rem !important; }
            .auth-btn { height: 40px !important; }
            .social-btn { width: 36px !important; height: 36px !important; font-size: 0.9rem !important; }
            .utility-row span { font-size: 0.65rem !important; }
            .utility-row a { font-size: 0.65rem !important; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="flex items-center gap-2" style="cursor: pointer;" onclick="document.getElementById('theme-toggle').click()">
            <i class="fas fa-sun text-xs" style="color: var(--page-text); transition: color 0.3s;"></i>
            <div class="toggle" id="theme-toggle"></div>
            <i class="fas fa-moon text-xs" style="color: var(--page-text); transition: color 0.3s;"></i>
        </div>
        <button id="rtl-toggle" class="top-btn-text">RTL Mode</button>
    </div>

    <div class="main-wrapper">
        <div class="login-card">

            <!-- EXACT SOLESHIFT LOGO FROM NAVBAR -->
            <div class="auth-logo">
                <a href="index.html" class="brand-font text-2xl lg:text-3xl font-black tracking-tighter italic flex items-center gap-2" style="color: var(--text-main); text-decoration: none;">
                    <i class="fa-solid fa-shoe-prints -rotate-90 text-[var(--accent-color)]"></i>
                    <span>SOLE<span style="color: var(--accent-color);">SHIFT</span></span>
                </a>
            </div>

            <div class="auth-header">
                <h2 class="brand-font italic font-black">Welcome Back</h2>
                <p>Sign in to access exclusive drops and orders.</p>
            </div>

            <form id="login-form">
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="input-field" placeholder="sneakerhead@example.com" required>
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="input-field password-field" placeholder="••••••••" required>
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="password-toggle" id="toggle-password" tabindex="-1" aria-label="Toggle password visibility">
                            <i class="fas fa-eye" id="toggle-icon"></i>
                        </button>
                    </div>
                </div>

                <div class="utility-row">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" class="flex-shrink-0 cursor-pointer">
                        <span class="ml-2 text-[0.7rem] font-semibold" style="color: var(--text-muted);">Remember me</span>
                    </label>
                    <a href="#" class="text-[0.7rem] font-bold transition whitespace-nowrap hover:opacity-80" style="color: var(--text-main);">Forgot Password?</a>
                </div>

                <button type="submit" class="auth-btn">Sign In <i class="fas fa-arrow-right ml-2 text-xs"></i></button>
            </form>

            <div class="divider"><span>Or authenticate with</span></div>

            <div class="social-login">
                <button class="social-btn" type="button" title="Sign in with Google"><i class="fab fa-google"></i></button>
                <button class="social-btn" type="button" title="Sign in with Apple"><i class="fab fa-apple"></i></button>
                <!-- Using Font Awesome 6.5.1 X-Twitter icon -->
                <button class="social-btn" type="button" title="Sign in with X"><i class="fa-brands fa-x-twitter"></i></button>
            </div>

            <div class="login-link">
                New to SoleShift? <a href="register.html">Create an Account</a>
            </div>

        </div>
    </div>

    <script>
        // --- THEME LOGIC ---
        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.classList.add('active');
        }

        themeToggle.onclick = (e) => {
            e.stopPropagation(); 
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.classList.toggle('active', isDark);
        };

        // --- RTL LOGIC ---
        const rtlToggle = document.getElementById('rtl-toggle');
        const savedDir = localStorage.getItem('dir') || 'ltr';
        
        if (savedDir === 'rtl') {
            document.documentElement.dir = 'rtl';
            rtlToggle.innerText = "LTR MODE";
        }

        rtlToggle.onclick = () => {
            const isRTL = document.documentElement.dir === 'rtl';
            document.documentElement.dir = isRTL ? 'ltr' : 'rtl';
            localStorage.setItem('dir', isRTL ? 'ltr' : 'rtl');
            rtlToggle.innerText = isRTL ? 'RTL MODE' : 'LTR MODE';
        };

        // --- PASSWORD TOGGLE LOGIC ---
        const togglePasswordBtn = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggle-icon');

        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleIcon.className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        });

        // --- FORM SUBMISSION ---
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Redirecting to index or dashboard
            window.location.href = 'index.html'; 
        });
    </script>
</body>
</html>
